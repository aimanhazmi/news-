server {
   charset utf-8;
   client_max_body_size 128M;
   sendfile on;

   listen 80;

   server_name dev.com;
   root        /data/web/dev/web;
   index       index.php index.html;

   location / {
       try_files $uri $uri/ /index-dev.php$is_args$args;
   }

   location ~ \.php$ {
        include fastcgi_params;
        # 这里需要配置成容器内的项目路径， 如果宿主机和 PHP 容器项目不一致的情况下
        # fastcgi_param SCRIPT_FILENAME docker/data/web$fastcgi_script_name;
        fastcgi_param SCRIPT_FILENAME /data/web/pord/web/$fastcgi_script_name;
        # fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # fastcgi_pass   fastcgi_php70fpm:9000;
        fastcgi_pass  127.0.0.1:9001;
        try_files     $uri =404;
   }
   
   location ~ \.(js|css|png|jpg|jpeg|gif|swf|ico|pdf|mov|fla|zip|rar)$ {
       expires    10d;
       access_log off;
       gzip       off;
       try_files  $uri =404;
   }

   location ~ /\.(ht|svn|git|scss|es6) {
       deny all;
   }

   location = /favicon.ico {
       log_not_found off;
       access_log    off;
   }
}